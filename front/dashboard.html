<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AztecMatch - Dashboard</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="navbar">
        <div class="navbar-title">
          AZTECMATCH
          <span class="navbar-heart">&hearts;</span>
        </div>
        <nav class="navbar-links">
          <a href="dashboard.html" class="active">Dashboard</a>
          <a href="create-profile.html">Create Profile</a>
          <a href="profile.html">My Profile</a>
          <button id="logout-btn" class="logout">Logout</button>
        </nav>
      </header>

      <main class="page">
        <section class="page-heading">
          <h1 id="dashboard-title">Welcome to AztecMatch.</h1>
          <p>This is the dashboard page for now. We plan to show matches and messages here.</p>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">You are logged in</div>
            <div class="pill">
              <span class="pill-dot"></span>
              <span>Prototype dashboard</span>
            </div>
          </div>
          <p class="helper-text">
            You can use this page to test logging in and out while we keep building
            the rest of the app.
          </p>
        </section>
      </main>
    </div>

    <script src="/static/js/auth.js"></script>
  </body>
</html>
