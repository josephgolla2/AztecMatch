<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AztecMatch - My Profile</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="navbar">
        <div class="navbar-title">
          AZTECMATCH
          <span class="navbar-heart">&hearts;</span>
        </div>
        <nav class="navbar-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="create-profile.html">Create Profile</a>
          <a href="profile.html" class="active">My Profile</a>
          <button id="logout-btn" class="logout">Logout</button>
        </nav>
      </header>

      <main class="page">
        <section class="page-heading">
          <h1>My Profile</h1>
          <p>View and update the information saved on your profile.</p>
        </section>

        <p id="profile-edit-error" class="error-text" style="display: none"></p>

        <section id="profile-view" class="card profile-card">
          <div class="card-header profile-view-header">
            <div class="card-title">Your profile</div>
            <button id="profile-edit-btn" type="button" class="btn secondary">Edit Profile</button>
          </div>

          <div class="profile-view-body">
            <img id="profile-view-photo" class="profile-photo-img large" alt="Profile photo" />
            <dl class="profile-dl">
              <dt>Name</dt>
              <dd id="pv-name">-</dd>
              <dt>Email</dt>
              <dd id="pv-email">-</dd>
              <dt>Gender</dt>
              <dd id="pv-gender">-</dd>
              <dt>Age</dt>
              <dd id="pv-age">-</dd>
              <dt>Height</dt>
              <dd id="pv-height">-</dd>
              <dt>Status</dt>
              <dd id="pv-status">-</dd>
              <dt>Major</dt>
              <dd id="pv-major">-</dd>
              <dt>Interests</dt>
              <dd id="pv-interests">-</dd>
              <dt>Bio</dt>
              <dd id="pv-bio">-</dd>
            </dl>
          </div>
        </section>

      </main>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/profile.js"></script>
  </body>
</html>
