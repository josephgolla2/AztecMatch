<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AztecMatch – My Profile</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="navbar">
        <div class="navbar-title">
          AZTECMATCH
          <span class="navbar-heart">♥</span>
        </div>
        <nav class="navbar-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="create-profile.html">Create Profile</a>
          <a href="profile.html" class="active">My Profile</a>
          <button id="logout-btn" class="logout">Logout</button>
        </nav>
      </header>

      <main class="page">
        <section class="page-heading">
          <h1>My Profile</h1>
          <p>View and edit your saved profile information.</p>
        </section>

        <p id="profile-edit-error" class="error-text" style="display: none"></p>

        <section id="profile-view" class="card profile-card">
          <div class="card-header profile-view-header">
            <div class="card-title">Your profile</div>
            <button id="profile-edit-btn" type="button" class="btn secondary">Edit Profile</button>
          </div>

          <div class="profile-view-body">
            <img id="profile-view-photo" class="profile-photo-img large" alt="Profile photo" />
            <dl class="profile-dl">
              <dt>Name</dt>
              <dd id="pv-name">-</dd>
              <dt>Email</dt>
              <dd id="pv-email">-</dd>
              <dt>Gender</dt>
              <dd id="pv-gender">-</dd>
              <dt>Age</dt>
              <dd id="pv-age">-</dd>
              <dt>Height</dt>
              <dd id="pv-height">-</dd>
              <dt>Status</dt>
              <dd id="pv-status">-</dd>
              <dt>Major</dt>
              <dd id="pv-major">-</dd>
              <dt>Interests</dt>
              <dd id="pv-interests">-</dd>
              <dt>Bio</dt>
              <dd id="pv-bio">-</dd>
            </dl>
          </div>
        </section>

        <section class="card profile-card">
          <div class="card-header">
            <div class="card-title">Edit profile</div>
          </div>
          <form id="profile-edit-form" class="form" style="display: none">
            <div class="profile-photo-row">
              <div class="profile-photo-frame">
                <img id="profile-edit-photo-preview" class="profile-photo-img" alt="Profile preview" />
              </div>
              <div class="form-row">
                <label for="profile-edit-photo">New profile picture</label>
                <input id="profile-edit-photo" type="file" accept="image/*" />
                <p class="helper-text">Leave empty to keep your existing photo.</p>
              </div>
            </div>

            <div class="form-row-inline">
              <div class="form-row">
                <label for="edit-gender">Gender</label>
                <select id="edit-gender" required>
                  <option value="">Select...</option>
                  <option value="Woman">Woman</option>
                  <option value="Man">Man</option>
                  <option value="Non-binary">Non-binary</option>
                  <option value="Prefer not to say">Prefer not to say</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-row">
                <label for="edit-age">Age</label>
                <input id="edit-age" type="number" min="13" max="120" required />
              </div>
            </div>

            <div class="form-row">
              <label for="edit-height">Height</label>
              <input id="edit-height" type="text" required />
            </div>

            <div class="form-row">
              <label for="edit-status">Status</label>
              <select id="edit-status" required>
                <option value="">Select...</option>
                <option value="Full-time student">Full-time student</option>
                <option value="Part-time student">Part-time student</option>
                <option value="Working full-time">Working full-time</option>
                <option value="Working part-time">Working part-time</option>
                <option value="Student and working">Student and working</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-row">
              <label for="edit-major">Major</label>
              <input id="edit-major" type="text" />
            </div>

            <div class="form-row">
              <label for="edit-interests">Interests</label>
              <textarea id="edit-interests"></textarea>
            </div>

            <div class="form-row">
              <label for="edit-bio">Bio</label>
              <textarea id="edit-bio"></textarea>
            </div>

            <div class="form-actions">
              <button id="profile-save-btn" type="submit" class="btn">Save changes</button>
              <button id="profile-cancel-btn" type="button" class="btn secondary">Cancel</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/profile.js"></script>
    <script>
      // load profile data
      document.addEventListener("DOMContentLoaded", async () => {
        const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
        if (user && user.id) {
          try {
            const res = await fetch("http://localhost:8080/api/profile/" + user.id);
            const data = await res.json();
            if (data.success && data.user) {
              document.getElementById('pv-name').textContent = data.user.first_name + ' ' + data.user.last_name;
              document.getElementById('pv-email').textContent = data.user.email || '—';
              document.getElementById('pv-gender').textContent = data.user.gender || '—';
              document.getElementById('pv-age').textContent = data.user.age || '—';
              document.getElementById('pv-height').textContent = data.user.height || '—';
              document.getElementById('pv-status').textContent = data.user.status || '—';
              document.getElementById('pv-major').textContent = data.user.major || '—';
              document.getElementById('pv-interests').textContent = data.user.interests || '—';
              document.getElementById('pv-bio').textContent = data.user.bio || '—';
              if (data.user.profile_picture) {
                const img = document.getElementById('profile-view-photo');
                if (img) { img.src = data.user.profile_picture; img.style.display = 'block'; }
              }
            }
          } catch(e) { console.error("Error loading profile:", e); }
        }
      });
    </script>
  </body>
</html>
