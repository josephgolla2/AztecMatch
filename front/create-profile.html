<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AztecMatch – Create Profile</title>
    <link rel="stylesheet" href="../static/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="navbar">
        <div class="navbar-title">
          AZTECMATCH
          <span class="navbar-heart">♥</span>
        </div>
        <nav class="navbar-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="create-profile.html" class="active">Create Profile</a>
          <a href="profile.html">My Profile</a>
          <button id="logout-btn" class="logout">Logout</button>
        </nav>
      </header>

      <main class="page">
        <section class="page-heading">
          <h1>Create your profile</h1>
          <p>Add your details now and update them any time from My Profile.</p>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">Profile Details</div>
          </div>
          <p id="profile-create-error" class="error-text" style="display: none"></p>

          <form id="profile-create-form" class="form">
            <div class="profile-photo-row">
              <div class="profile-photo-frame">
                <img id="profile-photo-preview" class="profile-photo-img" alt="Profile preview" hidden />
                <span id="profile-photo-placeholder" class="profile-photo-placeholder">Photo preview</span>
              </div>
              <div class="form-row">
                <label for="profile-photo">Profile picture</label>
                <input id="profile-photo" type="file" accept="image/*" />
                <p class="helper-text">PNG/JPG up to about 2.5MB.</p>
              </div>
            </div>

            <div class="form-row-inline">
              <div class="form-row">
                <label for="gender">Gender</label>
                <select id="gender" required>
                  <option value="">Select...</option>
                  <option value="Woman">Woman</option>
                  <option value="Man">Man</option>
                  <option value="Non-binary">Non-binary</option>
                  <option value="Prefer not to say">Prefer not to say</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-row">
                <label for="age">Age</label>
                <input id="age" type="number" min="13" max="120" required />
              </div>
            </div>

            <div class="form-row">
              <label for="height">Height</label>
              <input id="height" type="text" placeholder="e.g. 5'10 or 178 cm" required />
            </div>

            <div class="form-row">
              <label for="status">Status</label>
              <select id="status" required>
                <option value="">Select...</option>
                <option value="Full-time student">Full-time student</option>
                <option value="Part-time student">Part-time student</option>
                <option value="Working full-time">Working full-time</option>
                <option value="Working part-time">Working part-time</option>
                <option value="Student and working">Student and working</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-row">
              <label for="major">Major (optional)</label>
              <input id="major" type="text" />
            </div>

            <div class="form-row">
              <label for="interests">Interests (optional)</label>
              <textarea id="interests"></textarea>
            </div>

            <div class="form-row">
              <label for="bio">Bio (optional)</label>
              <textarea id="bio"></textarea>
            </div>

            <button id="profile-create-submit" type="submit" class="btn">Save Profile</button>
          </form>
        </section>
      </main>
    </div>

    <script src="../static/js/auth.js"></script>
    <script src="../static/js/profile.js"></script>
  </body>
</html>
