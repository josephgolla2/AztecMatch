<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AztecMatch - Create Profile</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>
  <div class="app-shell">
    <header class="navbar">
      <div class="navbar-title">
        AZTECMATCH
        <span class="navbar-heart">&hearts;</span>
      </div>
      <nav class="navbar-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="create-profile.html" class="active">Create Profile</a>
        <a href="profile.html">My Profile</a>
        <button id="logout-btn" class="logout">Logout</button>
      </nav>
    </header>

    <main class="page">
      <section class="page-heading">
        <h1>Create your profile</h1>
        <p>Add your details now and update them any time from My Profile.</p>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="card-title">Profile Details</div>
        </div>
        <p id="profile-create-error" class="error-text" style="display: none"></p>

        <form id="profile-create-form" class="form">
          <div class="profile-photo-row">
            <div class="profile-photo-frame">
              <img id="profile-photo-preview" class="profile-photo-img" alt="Profile preview" hidden />
              <span id="profile-photo-placeholder" class="profile-photo-placeholder">Photo preview</span>
            </div>
            <div class="form-row">
              <label for="profile-photo">Profile picture</label>
              <input id="profile-photo" type="file" accept="image/*" />
              <p class="helper-text">PNG/JPG up to about 2.5MB.</p>
            </div>
          </div>

          <div class="form-row-inline">
            <div class="form-row">
              <label for="gender">Gender</label>
              <select id="gender" required>
                <option value="">Select...</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
                <option value="Non-binary">Non-binary</option>
                <option value="Prefer not to say">Prefer not to say</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-row">
              <label for="age">Age</label>
              <input id="age" type="number" min="13" max="120" required />
            </div>
          </div>

          <div class="form-row">
            <label for="height">Height</label>
            <div class="height-inputs" style="display:flex;align-items:center;gap:8px;">
              <input id="height-feet" type="text" inputmode="numeric" maxlength="1" placeholder="5"
                style="width:60px;text-align:center;" required />
              <span>'</span>
              <input id="height-inches" type="text" inputmode="numeric" maxlength="2" placeholder="10"
                style="width:60px;text-align:center;" required />
              <span>"</span>
            </div>
          </div>
          <div class="form-row">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="">Select...</option>
              <option value="Full-time student">Full-time student</option>
              <option value="Part-time student">Part-time student</option>
              <option value="Working full-time">Working full-time</option>
              <option value="Working part-time">Working part-time</option>
              <option value="Student and working">Student and working</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-row">
            <label for="major">Major (optional)</label>
            <select id="major">
              <option value="">Select a major...</option>
              <optgroup label="College of Arts and Letters">
                <option>Africana Studies</option>
                <option>American Indian Studies</option>
                <option>Anthropology</option>
                <option>Asian Studies</option>
                <option>Brazilian Studies</option>
                <option>Chicana and Chicano Studies</option>
                <option>Classics and Humanities</option>
                <option>Comparative International Studies</option>
                <option>Economics</option>
                <option>English and Comparative Literature</option>
                <option>European Studies</option>
                <option>French</option>
                <option>Geography</option>
                <option>German</option>
                <option>History</option>
                <option>International Business</option>
                <option>International Security and Conflict Resolution</option>
                <option>Islamic and Arabic Studies</option>
                <option>Japanese</option>
                <option>Language, Culture, and Society</option>
                <option>Latin American Studies</option>
                <option>Linguistics and Asian/Middle Eastern Languages</option>
                <option>Modern Jewish Studies</option>
                <option>Philosophy</option>
                <option>Political Science</option>
                <option>Religious Studies</option>
                <option>Rhetoric and Writing Studies</option>
                <option>Russian</option>
                <option>Social Science</option>
                <option>Sociology</option>
                <option>Spanish and Portuguese Languages and Literatures</option>
                <option>Sustainability</option>
                <option>Urban Studies</option>
                <option>Women's Studies</option>
              </optgroup>
              <optgroup label="College of Education">
                <option>Child and Family Development</option>
                <option>Leadership Studies</option>
                <option>Liberal Studies</option>
              </optgroup>
              <optgroup label="College of Engineering">
                <option>Aerospace Engineering</option>
                <option>Civil, Construction, and Environmental Engineering</option>
                <option>Electrical and Computer Engineering</option>
                <option>Mechanical Engineering</option>
              </optgroup>
              <optgroup label="Fowler College of Business">
                <option>Accountancy</option>
                <option>Finance</option>
                <option>Financial Services</option>
                <option>Real Estate</option>
                <option>General Business</option>
                <option>Management Information Systems</option>
                <option>Management</option>
                <option>Marketing</option>
              </optgroup>
              <optgroup label="College of Health and Human Services">
                <option>Athletic Training</option>
                <option>Environmental Health</option>
                <option>Exercise Physiology</option>
                <option>Foods and Nutrition</option>

              <optgroup label="College of Professional Studies and Fine Arts">

                <option>Art History</option>
                <option>City Planning</option>
                <option>Communication</option>
                <option>Criminal Justice</option>
                <option>Dance Performance</option>

                <option>Jazz Studies</option>
                <option>Journalism</option>
                <option>Learning Design and Technology</option>
                <option>Media Studies</option>
                <option>Meetings and Events Operations and Management</option>
                <option>Multimedia and Photography</option>
                <option>Music</option>
                <option>Music Education</option>
                <option>Music Entrepreneurship and Business</option>
                <option>Music Recording Technology and Audio Design</option>
                <option>Outdoor Resource Management</option>
                <option>Painting and Printmaking</option>
                <option>Public Administration</option>
                <option>Public Relations</option>
                <option>Recreation Systems Management</option>
                <option>Restaurant Operations and Management</option>
                <option>Sculpture</option>
                <option>Studio Arts</option>
                <option>Sustainable Tourism Management</option>
                <option>Television, Film and New Media, Production</option>
                <option>Television, Film and New Media, Critical Studies</option>
                <option>Theatre Art</option>
                <option>Tribal Gaming Operations and Management</option>
              </optgroup>
              <optgroup label="College of Sciences">
                <option>Astronomy</option>
                <option>Biology</option>
                <option>Bioinformatics and Medical Informatics</option>
                <option>Chemistry and Biochemistry</option>
                <option>Computational Science</option>
                <option>Computer Science</option>
                <option>Environmental Science</option>
                <option>Geological Sciences</option>
                <option>Homeland Security</option>
                <option>Mathematics</option>

                <option>Statistics</option>
              </optgroup>
              <optgroup label="Undergraduate Studies">
                <option>Interdisciplinary Studies in Three Departments</option>
              </optgroup>
            </select>
          </div>

              </optgroup>
              <optgroup label="College of Education">

              </optgroup>
              <optgroup label="College of Engineering">
                <option>Aerospace Engineering</option>
                <option>Civil, Construction, and Environmental Engineering</option>
                <option>Electrical and Computer Engineering</option>
                <option>Mechanical Engineering</option>
              </optgroup>
              <optgroup label="Fowler College of Business">
                <option>Accountancy</option>
                <option>Finance</option>
                <option>Financial Services</option>
                <option>Real Estate</option>
                <option>General Business</option>
                <option>Management Information Systems</option>
                <option>Management</option>
                <option>Marketing</option>
              </optgroup>
              <optgroup label="College of Health and Human Services">
                <option>Athletic Training</option>
                <option>Environmental Health</option>
                <option>Exercise Physiology</option>
                <option>Foods and Nutrition</option>
                <option>Gerontology</option>
                <option>Global Health</option>

                <option>Kinesiology</option>
                <option>Nursing</option>
                <option>Nutritional Sciences</option>
                <option>Physical Therapy</option>
                <option>Public Health</option>
                <option>Social Work</option>
                <option>Speech, Language, and Hearing Sciences</option>
              </optgroup>
              <optgroup label="College of Professional Studies and Fine Arts">

                <option>Media Studies</option>

                <option>Music Entrepreneurship and Business</option>
                <option>Music Recording Technology and Audio Design</option>
                <option>Outdoor Resource Management</option>
                <option>Painting and Printmaking</option>
                <option>Public Administration</option>
                <option>Public Relations</option>
                <option>Recreation Systems Management</option>
                <option>Restaurant Operations and Management</option>
                <option>Sculpture</option>
                <option>Studio Arts</option>
                <option>Sustainable Tourism Management</option>
                <option>Television, Film and New Media, Production</option>
                <option>Television, Film and New Media, Critical Studies</option>
                <option>Theatre Art</option>
                <option>Tribal Gaming Operations and Management</option>
              </optgroup>
              <optgroup label="College of Sciences">
                <option>Astronomy</option>
                <option>Biology</option>
                <option>Bioinformatics and Medical Informatics</option>
                <option>Chemistry and Biochemistry</option>
                <option>Computational Science</option>

              </optgroup>
            </select>
            <button type="button" id="remove-second-major"
              style="margin-top:6px;background:none;border:none;color:#e05a5a;cursor:pointer;font-size:0.9em;">✕ Remove
              second major</button>
          </div>

          <div class="form-row">
            <button type="button" id="add-second-major"
              style="background:none;border:1px solid #888;border-radius:6px;padding:6px 14px;cursor:pointer;color:inherit;font-size:0.9em;">+
              Add second major</button>
          </div>
  </div>

  <div class="form-row">
    <label for="interests">Interests (optional)</label>
    <textarea id="interests"></textarea>
  </div>

  <div class="form-row">
    <label for="bio">Bio (optional)</label>
    <textarea id="bio"></textarea>
  </div>

  <button id="profile-create-submit" type="submit" class="btn">Save Profile</button>
  </form>
  </section>
  </main>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/profile.js"></script>
</body>

</html>
